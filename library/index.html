<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>책 서재</title>
<style>
  :root{
    --bg-deep:  #0e0b12;
    --wall:     #1a1428;
    --card:     #1f1830;
    --line:     #34293f;
    --cream:    #f1e7da;
    --muted:    #a89bb0;
    --accent:   #e8c468;
    --reading:  #f0a94e;
    --done:     #3ecf5e;
    --wishlist: #8fa6c2;
    --mono: ui-monospace, "SFMono-Regular", "Cascadia Mono", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  *{ box-sizing:border-box; }
  html, body{ margin:0; padding:0; }
  body{
    min-height:100vh;
    padding:24px 16px 40px;
    background: radial-gradient(ellipse at 50% -10%, #241b34 0%, var(--bg-deep) 55%);
    font-family:var(--sans);
    color:var(--cream);
  }
  .wrap{ max-width:1200px; margin:0 auto; }

  .head{
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
    padding:16px 20px; margin-bottom:16px; border-radius:14px;
    background:linear-gradient(180deg, #17101f, #0c0812); border:1px solid #2c2138;
  }
  .head h1{ margin:0; font-size:19px; font-family:var(--mono); letter-spacing:0.02em; }
  .head .count{ color:var(--muted); font-size:13px; }

  .controls{
    display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:20px;
  }
  #search-input{
    flex:1; min-width:180px; padding:9px 12px; border-radius:8px; border:1px solid var(--line);
    background:var(--card); color:var(--cream); font-size:14px;
  }
  #search-input::placeholder{ color:var(--muted); }
  .filter-btn{
    padding:8px 14px; border-radius:20px; border:1px solid var(--line); background:var(--card);
    color:var(--muted); font-size:13px; cursor:pointer; white-space:nowrap;
  }
  .filter-btn.active{ background:var(--accent); color:#231a08; border-color:var(--accent); font-weight:600; }

  .grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:16px;
  }
  .book-card{
    background:var(--card); border:1px solid var(--line); border-radius:12px; overflow:hidden;
    display:flex; flex-direction:column; text-decoration:none; color:inherit;
    transition:transform 0.15s ease, border-color 0.15s ease;
  }
  .book-card:hover{ transform:translateY(-3px); border-color:var(--accent); }
  .cover-box{
    aspect-ratio:3/4; background:#150f1f; display:flex; align-items:center; justify-content:center;
    overflow:hidden; position:relative;
  }
  .cover-box img{ width:100%; height:100%; object-fit:cover; display:block; }
  .cover-fallback{ font-size:32px; color:var(--muted); }
  .status-badge{
    position:absolute; top:6px; right:6px; font-size:10px; padding:3px 8px; border-radius:10px;
    font-weight:600; color:#0e0b12;
  }
  .status-읽는중  { background:var(--reading); }
  .status-완료    { background:var(--done); }
  .status-읽고싶음{ background:var(--wishlist); }

  .book-info{ padding:10px 12px 12px; display:flex; flex-direction:column; gap:3px; flex:1; }
  .book-title{ font-size:13.5px; font-weight:600; line-height:1.3; }
  .book-author{ font-size:12px; color:var(--muted); }
  .book-tags{ margin-top:auto; padding-top:6px; display:flex; flex-wrap:wrap; gap:4px; }
  .tag-chip{ font-size:10.5px; padding:2px 7px; border-radius:8px; background:#2b2140; color:var(--muted); }

  .empty{ text-align:center; padding:60px 20px; color:var(--muted); font-size:14px; }
  .foot-note{ text-align:center; color:var(--muted); font-size:11.5px; margin-top:24px; }

  .add-panel{
    padding:16px 20px; margin-bottom:20px; border-radius:14px;
    background:linear-gradient(180deg, #17101f, #0c0812); border:1px solid #2c2138;
  }
  .add-panel h2{ margin:0 0 12px; font-size:15px; }
  .add-form{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .add-form input, .add-form select{
    padding:9px 12px; border-radius:8px; border:1px solid var(--line);
    background:var(--card); color:var(--cream); font-size:14px;
  }
  .add-form input#book-title{ flex:1; min-width:180px; }
  .add-form input#book-tags{ flex:1; min-width:140px; }
  .add-form button{
    padding:9px 16px; border-radius:8px; border:none; background:var(--accent);
    color:#231a08; font-weight:600; font-size:14px; cursor:pointer;
  }
  .add-form button:disabled{ opacity:0.6; cursor:default; }
  .add-hint{ margin-top:8px; font-size:12px; color:var(--muted); }
  .add-message{ margin-top:8px; font-size:13px; }
  .add-message.error{ color:#f0a94e; }
  .add-message.success{ color:var(--done); }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>📚 책 서재</h1>
    <span class="count" id="count-label">불러오는 중...</span>
  </div>

  <div class="add-panel">
    <h2>+ 책 추가</h2>
    <div class="add-form">
      <input id="book-title" type="text" placeholder="책 제목">
      <select id="book-status">
        <option value="읽고 싶음">읽고 싶음</option>
        <option value="읽는 중">읽는 중</option>
        <option value="완료">완료</option>
      </select>
      <input id="book-tags" type="text" placeholder="태그(쉼표로 구분, 선택)">
      <button id="book-submit" type="button">추가하기</button>
    </div>
    <div class="add-hint" id="add-hint">확인 중...</div>
    <div class="add-message" id="add-message"></div>
  </div>

  <div class="controls">
    <input id="search-input" type="text" placeholder="제목·저자·태그 검색">
    <button class="filter-btn active" data-status="전체">전체</button>
    <button class="filter-btn" data-status="읽는 중">읽는 중</button>
    <button class="filter-btn" data-status="완료">완료</button>
    <button class="filter-btn" data-status="읽고 싶음">읽고 싶음</button>
  </div>

  <div class="grid" id="grid"></div>
  <div class="foot-note">책노트/ 폴더의 마크다운 노트에서 자동 생성됨 · 카드를 클릭하면 노트가 열립니다</div>
</div>

<script>
(() => {
  const VAULT_NAME = "책서재";
  let allBooks = [];
  let statusFilter = "전체";
  let searchTerm = "";

  function statusClass(status){
    return "status-" + (status || "").replace(/\s+/g, "");
  }

  function escapeHtml(s){
    return String(s || "").replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

  function obsidianLink(filename){
    const path = `책노트/${filename}`;
    return `obsidian://open?vault=${encodeURIComponent(VAULT_NAME)}&file=${encodeURIComponent(path)}`;
  }

  function cardHTML(book){
    const cover = book.cover
      ? `<img src="${escapeHtml(book.cover)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'cover-fallback\\'>📖</div>'">`
      : `<div class="cover-fallback">📖</div>`;
    const badge = book.status ? `<span class="status-badge ${statusClass(book.status)}">${escapeHtml(book.status)}</span>` : "";
    const tags = (book.tags || []).map(t => `<span class="tag-chip">${escapeHtml(t)}</span>`).join("");
    return `
      <a class="book-card" href="${obsidianLink(book.file)}">
        <div class="cover-box">${cover}${badge}</div>
        <div class="book-info">
          <div class="book-title">${escapeHtml(book.title)}</div>
          <div class="book-author">${escapeHtml(book.author || "저자 미상")}</div>
          <div class="book-tags">${tags}</div>
        </div>
      </a>`;
  }

  function render(){
    const grid = document.getElementById("grid");
    const term = searchTerm.trim().toLowerCase();
    const filtered = allBooks.filter(b => {
      if (statusFilter !== "전체" && b.status !== statusFilter) return false;
      if (!term) return true;
      const haystack = [b.title, b.author, ...(b.tags || [])].join(" ").toLowerCase();
      return haystack.includes(term);
    });

    document.getElementById("count-label").textContent = `${filtered.length} / ${allBooks.length}권`;

    if (filtered.length === 0){
      grid.innerHTML = `<div class="empty">해당하는 책이 없습니다.<br>add_book.py로 책을 추가해보세요.</div>`;
      return;
    }
    grid.innerHTML = filtered.map(cardHTML).join("");
  }

  document.getElementById("search-input").addEventListener("input", (e) => {
    searchTerm = e.target.value;
    render();
  });

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      statusFilter = btn.dataset.status;
      render();
    });
  });

  fetch("books.json")
    .then(r => r.ok ? r.json() : Promise.reject(r.status))
    .then(data => {
      allBooks = data;
      render();
    })
    .catch(() => {
      document.getElementById("count-label").textContent = "books.json을 불러오지 못했습니다";
      document.getElementById("grid").innerHTML = `<div class="empty">books.json을 찾을 수 없습니다.<br>book-notes/add_book.py 를 한 번 실행해서 인덱스를 생성해주세요.</div>`;
    });
})();
</script>
</body>
</html>
