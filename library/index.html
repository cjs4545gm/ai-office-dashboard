<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>책 서재</title>
<style>
  :root{
    --bg-deep:  #0e0b12;
    --wall:     #1a1428;
    --card:     #1f1830;
    --line:     #34293f;
    --cream:    #f1e7da;
    --muted:    #a89bb0;
    --accent:   #e8c468;
    --reading:  #f0a94e;
    --done:     #3ecf5e;
    --wishlist: #8fa6c2;
    --mono: ui-monospace, "SFMono-Regular", "Cascadia Mono", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  *{ box-sizing:border-box; }
  html, body{ margin:0; padding:0; }
  body{
    min-height:100vh;
    padding:24px 16px 40px;
    background: radial-gradient(ellipse at 50% -10%, #241b34 0%, var(--bg-deep) 55%);
    font-family:var(--sans);
    color:var(--cream);
  }
  .wrap{ max-width:1200px; margin:0 auto; }

  .head{
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
    padding:16px 20px; margin-bottom:16px; border-radius:14px;
    background:linear-gradient(180deg, #17101f, #0c0812); border:1px solid #2c2138;
  }
  .head h1{ margin:0; font-size:19px; font-family:var(--mono); letter-spacing:0.02em; }
  .head .count{ color:var(--muted); font-size:13px; }

  .controls{
    display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:20px;
  }
  #search-input{
    flex:1; min-width:180px; padding:9px 12px; border-radius:8px; border:1px solid var(--line);
    background:var(--card); color:var(--cream); font-size:14px;
  }
  #search-input::placeholder{ color:var(--muted); }
  .filter-btn{
    padding:8px 14px; border-radius:20px; border:1px solid var(--line); background:var(--card);
    color:var(--muted); font-size:13px; cursor:pointer; white-space:nowrap;
  }
  .filter-btn.active{ background:var(--accent); color:#231a08; border-color:var(--accent); font-weight:600; }

  .grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:16px;
  }
  .book-card{
    background:var(--card); border:1px solid var(--line); border-radius:12px; overflow:hidden;
    display:flex; flex-direction:column; text-decoration:none; color:inherit;
    transition:transform 0.15s ease, border-color 0.15s ease;
  }
  .book-card:hover{ transform:translateY(-3px); border-color:var(--accent); }
  .cover-box{
    aspect-ratio:3/4; background:#150f1f; display:flex; align-items:center; justify-content:center;
    overflow:hidden; position:relative;
  }
  .cover-box img{ width:100%; height:100%; object-fit:cover; display:block; }
  .cover-fallback{ font-size:32px; color:var(--muted); }
  .status-badge{
    position:absolute; top:6px; right:6px; font-size:10px; padding:3px 8px; border-radius:10px;
    font-weight:600; color:#0e0b12;
  }
  .status-읽는중  { background:var(--reading); }
  .status-완료    { background:var(--done); }
  .status-읽고싶음{ background:var(--wishlist); }

  .book-info{ padding:10px 12px 12px; display:flex; flex-direction:column; gap:3px; flex:1; }
  .book-title{ font-size:13.5px; font-weight:600; line-height:1.3; }
  .book-author{ font-size:12px; color:var(--muted); }
  .book-tags{ margin-top:auto; padding-top:6px; display:flex; flex-wrap:wrap; gap:4px; }
  .tag-chip{ font-size:10.5px; padding:2px 7px; border-radius:8px; background:#2b2140; color:var(--muted); }

  .empty{ text-align:center; padding:60px 20px; color:var(--muted); font-size:14px; }
  .foot-note{ text-align:center; color:var(--muted); font-size:11.5px; margin-top:24px; }

  .add-panel{
    padding:16px 20px; margin-bottom:20px; border-radius:14px;
    background:linear-gradient(180deg, #17101f, #0c0812); border:1px solid #2c2138;
  }
  .add-panel h2{ margin:0 0 12px; font-size:15px; }
  .add-form{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .add-form input, .add-form select{
    padding:9px 12px; border-radius:8px; border:1px solid var(--line);
    background:var(--card); color:var(--cream); font-size:14px;
  }
  .add-form input#book-title{ flex:1; min-width:180px; }
  .add-form input#book-tags{ flex:1; min-width:140px; }
  .add-form button{
    padding:9px 16px; border-radius:8px; border:none; background:var(--accent);
    color:#231a08; font-weight:600; font-size:14px; cursor:pointer;
  }
  .add-form button:disabled{ opacity:0.6; cursor:default; }
  .add-hint{ margin-top:8px; font-size:12px; color:var(--muted); }
  .add-message{ margin-top:8px; font-size:13px; }
  .add-message.error{ color:#f0a94e; }
  .add-message.success{ color:var(--done); }

  .candidate-list{ margin-top:12px; display:flex; flex-direction:column; gap:6px; }
  .candidate-row{
    display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px;
    background:var(--card); border:1px solid var(--line);
  }
  .candidate-cover{ width:32px; height:44px; object-fit:cover; border-radius:3px; background:#150f1f; flex-shrink:0; }
  .candidate-cover-fallback{
    width:32px; height:44px; border-radius:3px; background:#150f1f; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--muted);
  }
  .candidate-info{ flex:1; min-width:0; }
  .candidate-title{ font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .candidate-author{ font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .candidate-row button{
    padding:6px 12px; border-radius:6px; border:none; background:var(--accent);
    color:#231a08; font-weight:600; font-size:12px; cursor:pointer; flex-shrink:0;
  }
  .candidate-blank{
    padding:8px 10px; font-size:12.5px; color:var(--muted); background:transparent;
    border:1px dashed var(--line); border-radius:8px; text-align:center; cursor:pointer;
  }
  .candidate-blank:hover{ border-color:var(--accent); color:var(--cream); }

  .book-card{ position:relative; cursor:pointer; }
  .book-delete{
    position:absolute; top:6px; left:6px; width:22px; height:22px; border-radius:6px;
    border:none; background:rgba(14,11,18,0.75); color:var(--cream); font-size:12px;
    cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:1;
  }
  .book-delete:hover{ background:#c0392b; }
  .book-obsidian-link{
    position:absolute; bottom:6px; right:6px; width:22px; height:22px; border-radius:6px;
    background:rgba(14,11,18,0.75); color:var(--cream); font-size:11px; text-decoration:none;
    display:flex; align-items:center; justify-content:center; z-index:1;
  }
  .book-obsidian-link:hover{ background:rgba(14,11,18,0.92); }

  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,7,14,0.72); display:flex; align-items:center;
    justify-content:center; padding:20px; z-index:50;
  }
  .modal-overlay.hidden{ display:none; }
  .modal{
    background:var(--wall); border:1px solid var(--line); border-radius:14px; max-width:640px;
    width:100%; max-height:88vh; overflow-y:auto; padding:20px 22px 24px; position:relative;
  }
  .modal-close{
    position:absolute; top:12px; right:14px; background:transparent; border:none; color:var(--muted);
    font-size:18px; cursor:pointer; line-height:1;
  }
  .modal-close:hover{ color:var(--cream); }
  .modal-head{ display:flex; gap:14px; margin-bottom:16px; padding-right:20px; }
  .modal-cover{ width:64px; height:88px; object-fit:cover; border-radius:6px; background:#150f1f; flex-shrink:0; }
  .modal-cover-fallback{
    width:64px; height:88px; border-radius:6px; background:#150f1f; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--muted);
  }
  .modal-title-block{ min-width:0; }
  .modal-title{ font-size:16px; font-weight:700; margin-bottom:2px; }
  .modal-author{ font-size:12.5px; color:var(--muted); margin-bottom:6px; }
  .modal-meta-row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .modal-obsidian-link{
    font-size:11px; color:var(--muted); text-decoration:none; border:1px solid var(--line);
    border-radius:6px; padding:2px 8px;
  }
  .modal-obsidian-link:hover{ color:var(--cream); border-color:var(--accent); }
  .modal-section{ margin-top:14px; }
  .modal-section h3{ margin:0 0 6px; font-size:12.5px; color:var(--muted); font-weight:600; }
  .modal-textarea{
    width:100%; min-height:110px; padding:10px 12px; border-radius:8px; border:1px solid var(--line);
    background:var(--card); color:var(--cream); font-size:13.5px; font-family:var(--sans); resize:vertical;
  }
  .modal-polished{
    white-space:pre-wrap; font-size:13.5px; line-height:1.6; color:var(--cream); background:var(--card);
    border:1px solid var(--line); border-radius:8px; padding:10px 12px; min-height:40px;
  }
  .modal-polished.empty{ color:var(--muted); font-style:italic; }
  .modal-actions{ display:flex; gap:8px; margin-top:8px; align-items:center; }
  .modal-actions button{
    padding:7px 14px; border-radius:7px; border:none; background:var(--accent); color:#231a08;
    font-weight:600; font-size:12.5px; cursor:pointer;
  }
  .modal-actions button.secondary{ background:transparent; border:1px solid var(--line); color:var(--muted); }
  .modal-actions button:disabled{ opacity:0.6; cursor:default; }
  .modal-message{ font-size:12px; margin-top:6px; }
  .modal-message.error{ color:#f0a94e; }
  .modal-message.success{ color:var(--done); }
  .modal-readonly-note{ font-size:12px; color:var(--muted); font-style:italic; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>📚 책 서재</h1>
    <span class="count" id="count-label">불러오는 중...</span>
  </div>

  <div class="add-panel">
    <h2>+ 책 추가</h2>
    <div class="add-form">
      <input id="book-title" type="text" placeholder="책 제목">
      <select id="book-status">
        <option value="읽고 싶음">읽고 싶음</option>
        <option value="읽는 중">읽는 중</option>
        <option value="완료">완료</option>
      </select>
      <input id="book-tags" type="text" placeholder="태그(쉼표로 구분, 선택)">
      <button id="book-submit" type="button">검색</button>
    </div>
    <div class="add-hint" id="add-hint">확인 중...</div>
    <div class="add-message" id="add-message"></div>
    <div class="candidate-list" id="candidate-list"></div>
  </div>

  <div class="controls">
    <input id="search-input" type="text" placeholder="제목·저자·태그 검색">
    <button class="filter-btn active" data-status="전체">전체</button>
    <button class="filter-btn" data-status="읽는 중">읽는 중</button>
    <button class="filter-btn" data-status="완료">완료</button>
    <button class="filter-btn" data-status="읽고 싶음">읽고 싶음</button>
  </div>

  <div class="grid" id="grid"></div>
  <div class="foot-note">책노트/ 폴더의 마크다운 노트에서 자동 생성됨 · 카드를 클릭하면 요약을 보고 쓸 수 있어요(📓 아이콘은 Obsidian 노트로 이동)</div>
</div>

<div class="modal-overlay hidden" id="book-modal-overlay">
  <div class="modal" id="book-modal">
    <button class="modal-close" id="modal-close-btn" type="button">✕</button>
    <div class="modal-head">
      <div id="modal-cover-slot"></div>
      <div class="modal-title-block">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-author" id="modal-author"></div>
        <div class="modal-meta-row">
          <span class="tag-chip" id="modal-status"></span>
          <a class="modal-obsidian-link" id="modal-obsidian-link" href="#">Obsidian에서 열기 →</a>
        </div>
      </div>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
(() => {
  const VAULT_NAME = "책서재";
  let allBooks = [];
  let statusFilter = "전체";
  let searchTerm = "";

  function statusClass(status){
    return "status-" + (status || "").replace(/\s+/g, "");
  }

  function escapeHtml(s){
    return String(s || "").replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

  function obsidianLink(filename){
    const path = `책노트/${filename}`;
    return `obsidian://open?vault=${encodeURIComponent(VAULT_NAME)}&file=${encodeURIComponent(path)}`;
  }

  function cardHTML(book){
    const cover = book.cover
      ? `<img src="${escapeHtml(book.cover)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'cover-fallback\\'>📖</div>'">`
      : `<div class="cover-fallback">📖</div>`;
    const badge = book.status ? `<span class="status-badge ${statusClass(book.status)}">${escapeHtml(book.status)}</span>` : "";
    const obsidianBtn = `<a class="book-obsidian-link" href="${obsidianLink(book.file)}" title="Obsidian에서 열기" onclick="event.stopPropagation()">📓</a>`;
    const tags = (book.tags || []).map(t => `<span class="tag-chip">${escapeHtml(t)}</span>`).join("");
    return `
      <div class="book-card" data-file="${escapeHtml(book.file)}" data-title="${escapeHtml(book.title)}">
        <button class="book-delete" title="삭제">✕</button>
        <div class="cover-box">${cover}${badge}${obsidianBtn}</div>
        <div class="book-info">
          <div class="book-title">${escapeHtml(book.title)}</div>
          <div class="book-author">${escapeHtml(book.author || "저자 미상")}</div>
          <div class="book-tags">${tags}</div>
        </div>
      </div>`;
  }

  function render(){
    const grid = document.getElementById("grid");
    const term = searchTerm.trim().toLowerCase();
    const filtered = allBooks.filter(b => {
      if (statusFilter !== "전체" && b.status !== statusFilter) return false;
      if (!term) return true;
      const haystack = [b.title, b.author, ...(b.tags || [])].join(" ").toLowerCase();
      return haystack.includes(term);
    });

    document.getElementById("count-label").textContent = `${filtered.length} / ${allBooks.length}권`;

    if (filtered.length === 0){
      grid.innerHTML = `<div class="empty">해당하는 책이 없습니다.<br>add_book.py로 책을 추가해보세요.</div>`;
      return;
    }
    grid.innerHTML = filtered.map(cardHTML).join("");
  }

  document.getElementById("search-input").addEventListener("input", (e) => {
    searchTerm = e.target.value;
    render();
  });

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      statusFilter = btn.dataset.status;
      render();
    });
  });

  // 카드는 검색/필터 때마다 통째로 다시 그려지므로, 클릭 처리는 grid 컨테이너에 이벤트
  // 위임으로 한 번만 붙인다(office.html의 활동로그 펼치기와 동일한 패턴). 삭제 버튼 클릭이면
  // 삭제, 그 외 카드 클릭이면 상세 모달을 연다(2026-07-15) — 예전엔 카드 전체가 obsidian://
  // 링크였는데, 요약을 웹에서 바로 쓰고 볼 수 있게 모달로 바꾸고 Obsidian 링크는 📓 아이콘으로 뺐다.
  document.getElementById("grid").addEventListener("click", async (ev) => {
    const delBtn = ev.target.closest(".book-delete");
    if (delBtn) {
      ev.preventDefault();
      const card = delBtn.closest(".book-card");
      const file = card.dataset.file;
      const title = card.dataset.title;
      await checkLocalSubmit();  // 캐시된 값을 믿지 않고 매번 다시 확인(위 검색/추가와 동일한 이유)
      if (localSubmitAvailable !== true){
        showAddMessage("삭제는 이 서재 파일이 있는 기기(로컬)에서만 가능합니다.", "error");
        return;
      }
      if (!confirm(`'${title}'을(를) 서재에서 삭제할까요?`)) return;
      try {
        const resp = await fetch(`${LOCAL_SUBMIT_ORIGIN}/delete`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ file }),
          signal: AbortSignal.timeout(10000),
        });
        const data = await resp.json();
        if (!resp.ok || !data.ok) throw new Error(data.error || "삭제 실패");
        loadBooks();
      } catch (e) {
        showAddMessage(`삭제하지 못했습니다: ${e.message}`, "error");
      }
      return;
    }

    const card = ev.target.closest(".book-card");
    if (card) openBookModal(card.dataset.file);
  });

  function renderModalCover(book){
    const slot = document.getElementById("modal-cover-slot");
    slot.innerHTML = book.cover
      ? `<img class="modal-cover" src="${escapeHtml(book.cover)}" alt="" onerror="this.outerHTML='<div class=\\'modal-cover-fallback\\'>📖</div>'">`
      : `<div class="modal-cover-fallback">📖</div>`;
  }

  function closeBookModal(){
    document.getElementById("book-modal-overlay").classList.add("hidden");
  }

  document.getElementById("modal-close-btn").addEventListener("click", closeBookModal);
  document.getElementById("book-modal-overlay").addEventListener("click", (ev) => {
    if (ev.target.id === "book-modal-overlay") closeBookModal();
  });
  document.addEventListener("keydown", (ev) => {
    if (ev.key === "Escape") closeBookModal();
  });

  function renderModalBody(file, draft, polished){
    const bodyEl = document.getElementById("modal-body");
    bodyEl.innerHTML = `
      <div class="modal-section">
        <h3>내 요약 (초안)</h3>
        <textarea class="modal-textarea" id="modal-draft">${escapeHtml(draft)}</textarea>
        <div class="modal-actions">
          <button type="button" id="modal-save-btn">저장</button>
          <button type="button" class="secondary" id="modal-reload-btn">다시 불러오기</button>
        </div>
        <div class="modal-message" id="modal-message"></div>
      </div>
      <div class="modal-section">
        <h3>다듬은 요약</h3>
        <div class="modal-polished${polished ? "" : " empty"}">${polished ? escapeHtml(polished) : "아직 다듬어지지 않았습니다 — 초안 저장 후 최대 10분 내 자동 생성됩니다."}</div>
      </div>`;
    document.getElementById("modal-save-btn").addEventListener("click", () => saveModalDraft(file));
    document.getElementById("modal-reload-btn").addEventListener("click", () => openBookModal(file));
  }

  async function saveModalDraft(file){
    const btn = document.getElementById("modal-save-btn");
    const draft = document.getElementById("modal-draft").value;
    const msg = document.getElementById("modal-message");
    btn.disabled = true;
    msg.textContent = "";
    msg.className = "modal-message";
    try {
      const resp = await fetch(`${LOCAL_SUBMIT_ORIGIN}/note`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ file, draft }),
        signal: AbortSignal.timeout(10000),
      });
      const data = await resp.json();
      if (!resp.ok || !data.ok) throw new Error(data.error || "저장 실패");
      msg.textContent = "저장했습니다 — 다듬은 요약은 최대 10분 내 자동 생성됩니다.";
      msg.className = "modal-message success";
    } catch (e) {
      msg.textContent = `저장하지 못했습니다: ${e.message}`;
      msg.className = "modal-message error";
    } finally {
      btn.disabled = false;
    }
  }

  async function openBookModal(file){
    const book = allBooks.find(b => b.file === file);
    if (!book) return;
    document.getElementById("book-modal-overlay").classList.remove("hidden");
    document.getElementById("modal-title").textContent = book.title;
    document.getElementById("modal-author").textContent = book.author || "저자 미상";
    document.getElementById("modal-status").textContent = book.status || "";
    document.getElementById("modal-obsidian-link").href = obsidianLink(book.file);
    renderModalCover(book);

    const bodyEl = document.getElementById("modal-body");
    bodyEl.innerHTML = `<div class="modal-readonly-note">불러오는 중...</div>`;

    await checkLocalSubmit();
    if (!localSubmitAvailable){
      bodyEl.innerHTML = `<div class="modal-readonly-note">이 기능(요약 작성·보기)은 이 서재 파일이 있는 기기(로컬)에서만 가능합니다.</div>`;
      return;
    }

    try {
      const resp = await fetch(`${LOCAL_SUBMIT_ORIGIN}/note?file=${encodeURIComponent(file)}`, {
        signal: AbortSignal.timeout(10000),
      });
      const data = await resp.json();
      if (!resp.ok || !data.ok) throw new Error(data.error || "노트를 불러오지 못했습니다");
      renderModalBody(file, data.draft || "", data.polished || "");
    } catch (e) {
      bodyEl.innerHTML = `<div class="modal-message error">불러오지 못했습니다: ${escapeHtml(e.message)}</div>`;
    }
  }

  function loadBooks(){
    fetch(`books.json?t=${Date.now()}`, { cache: "no-store" })
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => {
        allBooks = data;
        render();
      })
      .catch(() => {
        document.getElementById("count-label").textContent = "books.json을 불러오지 못했습니다";
        document.getElementById("grid").innerHTML = `<div class="empty">books.json을 찾을 수 없습니다.<br>book-notes/add_book.py 를 한 번 실행해서 인덱스를 생성해주세요.</div>`;
      });
  }

  // 로컬(Obsidian)에서 열었을 때는 127.0.0.1의 book_submit_server.py가 책을 바로 추가해줘서
  // 화면 이동 없이 인덱스가 갱신된다. 공개 GitHub Pages 버전 등 로컬 서버가 없는 환경에서는
  // GitHub 이슈(book-request 라벨) 생성으로 자동 폴백하고, book_request_watcher.py가 5분 간격으로
  // 확인해 대신 추가한다 — strategy_advisor.py의 질문 제출과 동일한 패턴.
  const LOCAL_SUBMIT_ORIGIN = "http://127.0.0.1:8766";
  let localSubmitAvailable = null;

  async function checkLocalSubmit(){
    try {
      const resp = await fetch(`${LOCAL_SUBMIT_ORIGIN}/health`, { signal: AbortSignal.timeout(1500) });
      localSubmitAvailable = resp.ok;
    } catch (e) {
      localSubmitAvailable = false;
    }
    const hint = document.getElementById("add-hint");
    hint.textContent = localSubmitAvailable
      ? "제목을 넣고 검색하면 후보 중에서 골라 바로 추가할 수 있습니다. (삭제도 이 화면에서 가능)"
      : "검색은 이 화면에서 바로 됩니다 — 이 기기에 서버가 없으면 '추가'만 GitHub 이슈 작성 화면으로 넘어갑니다(본인 GitHub 로그인 필요, 1회 확인 클릭, 5분 내 서재에 반영). 삭제는 로컬 기기에서만 가능합니다.";
  }
  checkLocalSubmit();

  // 로컬 서버 없이도(GitHub Pages 등) 검색만은 항상 이 화면에서 끝나도록, Google Books 공개 API를
  // 브라우저에서 직접 호출한다 — 키 불필요·CORS 허용되는 공식 API라 add_book.py의
  // search_google_candidates()와 동일한 매핑을 JS로 그대로 재현(2026-07-15 추가).
  async function searchGoogleBooksDirect(title){
    const resp = await fetch(
      `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(title)}&maxResults=5`,
      { signal: AbortSignal.timeout(15000) },
    );
    if (!resp.ok) throw new Error(`Google Books 조회 실패 (${resp.status})`);
    const data = await resp.json();
    return (data.items || []).map(item => {
      const info = item.volumeInfo || {};
      const imageLinks = info.imageLinks || {};
      const isbnEntry = (info.industryIdentifiers || []).find(id => id.type === "ISBN_13" || id.type === "ISBN_10");
      return {
        title: info.title || title,
        author: (info.authors || []).join(", "),
        publisher: info.publisher || "",
        cover: (imageLinks.thumbnail || imageLinks.smallThumbnail || "").replace("http://", "https://"),
        isbn: isbnEntry ? isbnEntry.identifier : "",
        source: "google",
      };
    });
  }

  // OpenLibrary(openlibrary.org/search.json) — 키 불필요, add_book.py의
  // search_openlibrary_candidates()와 동일한 매핑(2026-07-15 추가). Google Books 결과가
  // 없을 때(할당량 소진 포함) 폴백으로만 호출된다.
  async function searchOpenLibraryDirect(title){
    const resp = await fetch(
      `https://openlibrary.org/search.json?q=${encodeURIComponent(title)}&limit=5`,
      { signal: AbortSignal.timeout(15000) },
    );
    if (!resp.ok) throw new Error(`OpenLibrary 조회 실패 (${resp.status})`);
    const data = await resp.json();
    return (data.docs || []).slice(0, 5).map(doc => {
      const coverId = doc.cover_i;
      const isbns = doc.isbn || [];
      return {
        title: doc.title || title,
        author: (doc.author_name || []).join(", "),
        publisher: (doc.publisher || [""])[0],
        cover: coverId ? `https://covers.openlibrary.org/b/id/${coverId}-M.jpg` : "",
        isbn: isbns[0] || "",
        source: "openlibrary",
      };
    });
  }

  // NDL Search(일본 국립국회도서관, ndlsearch.ndl.go.jp) — 키 불필요, 일본어 도서 커버리지가
  // Google Books/OpenLibrary보다 훨씬 좋다. add_book.py의 search_ndl_candidates()와 동일한
  // 매핑을 XML(DOMParser)로 재현(2026-07-15 추가). <category>가 "図書"인 item만 책으로 채택.
  async function searchNdlDirect(title){
    const resp = await fetch(
      `https://ndlsearch.ndl.go.jp/api/opensearch?title=${encodeURIComponent(title)}&cnt=15`,
      { signal: AbortSignal.timeout(15000) },
    );
    if (!resp.ok) throw new Error(`NDL 조회 실패 (${resp.status})`);
    const xmlText = await resp.text();
    const xmlDoc = new DOMParser().parseFromString(xmlText, "application/xml");
    if (xmlDoc.querySelector("parsererror")) throw new Error("NDL 응답 파싱 실패");
    const candidates = [];
    for (const item of Array.from(xmlDoc.getElementsByTagName("item"))) {
      const categories = Array.from(item.getElementsByTagName("category")).map(c => c.textContent);
      if (!categories.includes("図書")) continue;
      const dcTitle = item.getElementsByTagName("dc:title")[0];
      const dcCreator = item.getElementsByTagName("dc:creator")[0];
      const dcPublisher = item.getElementsByTagName("dc:publisher")[0];
      let isbn = "";
      for (const ident of Array.from(item.getElementsByTagName("dc:identifier"))) {
        const text = (ident.textContent || "").trim();
        if (/^[\d-]{9,17}$/.test(text)) { isbn = text; break; }
      }
      candidates.push({
        title: (dcTitle && dcTitle.textContent) || title,
        author: ((dcCreator && dcCreator.textContent) || "").trim(),
        publisher: ((dcPublisher && dcPublisher.textContent) || "").trim(),
        cover: "",
        isbn,
        source: "ndl",
      });
      if (candidates.length >= 5) break;
    }
    return candidates;
  }

  function openGithubIssueFallback(title, meta){
    let body = `${title}\n\n---\n서재 웹에서 남긴 책 추가 요청입니다.`;
    if (meta) {
      // book_request_watcher.py가 이 마커를 파싱해 재검색 없이 정확히 이 후보로 추가한다.
      body += `\n\n<!-- meta:${JSON.stringify(meta)} -->`;
    }
    const url = `https://github.com/cjs4545gm/ai-office-dashboard/issues/new?labels=book-request&title=${encodeURIComponent(title)}&body=${encodeURIComponent(body)}`;
    window.open(url, "_blank", "noopener");
  }

  function showAddMessage(text, kind){
    const el = document.getElementById("add-message");
    el.textContent = text;
    el.className = `add-message ${kind}`;
  }

  function candidateRowHTML(index, c){
    const cover = c.cover
      ? `<img class="candidate-cover" src="${escapeHtml(c.cover)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'candidate-cover-fallback\\'>📖</div>'">`
      : `<div class="candidate-cover-fallback">📖</div>`;
    return `
      <div class="candidate-row">
        ${cover}
        <div class="candidate-info">
          <div class="candidate-title">${escapeHtml(c.title)}</div>
          <div class="candidate-author">${escapeHtml(c.author || "저자 미상")}</div>
        </div>
        <button data-index="${index}" type="button">이 책 추가</button>
      </div>`;
  }

  let lastCandidates = [];

  // 로컬 서버가 있으면 즉시 반영(viaGithub:false), 없으면 GitHub 이슈로 폴백(viaGithub:true) —
  // 검색과 달리 "추가"(파일 쓰기)는 로컬 기기에서만 직접 할 수 있어 폴백이 필요하다.
  async function submitAdd(title, meta, statusValue, tagsValue){
    if (!localSubmitAvailable){
      openGithubIssueFallback(title, meta);
      return { viaGithub: true };
    }
    const resp = await fetch(`${LOCAL_SUBMIT_ORIGIN}/add`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, status: statusValue, tags: tagsValue, meta: meta || null }),
      signal: AbortSignal.timeout(20000),
    });
    const data = await resp.json();
    if (!resp.ok || !data.ok) throw new Error(data.error || "추가 실패");
    return { viaGithub: false };
  }

  document.getElementById("candidate-list").addEventListener("click", async (ev) => {
    const btn = ev.target.closest("button[data-index]");
    if (!btn) return;
    const candidate = lastCandidates[Number(btn.dataset.index)];
    const statusValue = document.getElementById("book-status").value;
    const tagsValue = document.getElementById("book-tags").value;
    btn.disabled = true;
    try {
      const result = await submitAdd(candidate.title, candidate, statusValue, tagsValue);
      document.getElementById("book-title").value = "";
      document.getElementById("book-tags").value = "";
      document.getElementById("candidate-list").innerHTML = "";
      showAddMessage(
        result.viaGithub
          ? "GitHub 이슈 작성 화면을 열었습니다. 제출 후 5분 내 서재에 반영됩니다."
          : `'${candidate.title}' 서재에 추가했습니다.`,
        "success",
      );
      if (!result.viaGithub) loadBooks();
    } catch (e) {
      showAddMessage(`추가하지 못했습니다: ${e.message}`, "error");
      btn.disabled = false;
    }
  });

  async function addBlank(title){
    const statusValue = document.getElementById("book-status").value;
    const tagsValue = document.getElementById("book-tags").value;
    try {
      const result = await submitAdd(title, null, statusValue, tagsValue);
      document.getElementById("book-title").value = "";
      document.getElementById("book-tags").value = "";
      document.getElementById("candidate-list").innerHTML = "";
      showAddMessage(
        result.viaGithub
          ? "GitHub 이슈 작성 화면을 열었습니다. 제출 후 5분 내 서재에 반영됩니다."
          : `'${title}' 서재에 추가했습니다(빈 틀 — 나중에 노트에서 직접 채워주세요).`,
        "success",
      );
      if (!result.viaGithub) loadBooks();
    } catch (e) {
      showAddMessage(`추가하지 못했습니다: ${e.message}`, "error");
    }
  }

  document.getElementById("book-submit").addEventListener("click", async () => {
    const titleInput = document.getElementById("book-title");
    const button = document.getElementById("book-submit");
    const title = titleInput.value.trim();
    if (!title) return;

    // 페이지 로드 시점의 1회성 헬스체크 결과를 영구 캐시하지 않고 검색 직전에 매번 다시 확인—
    // 로드 당시 서버가 막 재시작 중이었거나 순간적으로 응답이 늦었을 경우, 그 뒤로 서버가
    // 멀쩡히 떠 있어도 이 페이지에서는 계속 GitHub 폴백만 타는 문제를 방지한다
    // (2026-07-14 실측 재현: book-submit-server를 여러 번 재시작하며 테스트하던 중 사용자가
    // 페이지를 열어 최초 체크가 실패로 캐시된 채 이후 클릭에서도 계속 GitHub로 넘어갔음).
    await checkLocalSubmit();

    // 검색은 로컬 서버 유무와 무관하게 항상 이 화면에서 끝난다(2026-07-15) — 로컬 서버가 있으면
    // /search로 위임(서버 쿼터 재사용), 없으면 Google Books를 브라우저에서 직접 호출한다.
    // GitHub 이슈 폴백은 "이 책 추가"를 실제로 눌렀을 때(submitAdd)로만 미룬다.
    button.disabled = true;
    button.textContent = "검색 중...";
    document.getElementById("candidate-list").innerHTML = "";
    showAddMessage("", "");
    try {
      let candidates;
      if (localSubmitAvailable){
        const resp = await fetch(`${LOCAL_SUBMIT_ORIGIN}/search?q=${encodeURIComponent(title)}`, {
          signal: AbortSignal.timeout(15000),
        });
        const data = await resp.json();
        if (!resp.ok || !data.ok) throw new Error(data.error || "검색 실패");
        candidates = data.candidates || [];
      } else {
        // add_book.py의 search_candidates()와 동일한 순서: Google Books를 먼저 시도하고
        // (실패해도 예외를 던지지 않고 빈 배열로 처리 — 할당량 소진 429가 흔함), 결과가
        // 없을 때만 OpenLibrary+NDL을 추가로 시도해 합친다.
        candidates = await searchGoogleBooksDirect(title).catch(() => []);
        if (candidates.length === 0){
          const [olResults, ndlResults] = await Promise.all([
            searchOpenLibraryDirect(title).catch(() => []),
            searchNdlDirect(title).catch(() => []),
          ]);
          candidates = olResults.concat(ndlResults).slice(0, 5);
        }
      }
      lastCandidates = candidates;
      const list = document.getElementById("candidate-list");
      if (lastCandidates.length === 0){
        list.innerHTML = `<div class="candidate-blank" id="add-blank-btn">검색 결과가 없습니다 — 빈 틀로 추가하기</div>`;
      } else {
        list.innerHTML = lastCandidates.map((c, i) => candidateRowHTML(i, c)).join("")
          + `<div class="candidate-blank" id="add-blank-btn">원하는 책이 없나요? 빈 틀로 추가하기</div>`;
      }
      document.getElementById("add-blank-btn").addEventListener("click", () => addBlank(title));
    } catch (e) {
      showAddMessage(`검색하지 못했습니다: ${e.message}`, "error");
    } finally {
      button.disabled = false;
      button.textContent = "검색";
    }
  });

  loadBooks();
})();
</script>
</body>
</html>
